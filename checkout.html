<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEASAR - Subscribe to Premium</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;700;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        roman: {
                            gold: '#D4AF37',
                            red: '#721422',
                            dark: '#0f172a',
                            card: '#1e293b'
                        }
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Inter"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Script do PayPal -->
    <!-- SUBSTITUI o Client-ID abaixo pelo teu verdadeiro -->
    <script src="https://www.paypal.com/sdk/js?client-id=AecodqpTkHgk-Zmqm86S1gajXSxnbtJ5TKmn7pphaocvdLOHa55KPritoyhTWX29UKqS-o66pFTECLFq&currency=EUR&vault=true&intent=subscription"></script>
</head>

<!-- O Fundo Radial EXATAMENTE igual ao Hero da Index -->
<body class="font-sans text-gray-200 antialiased flex flex-col items-center justify-center min-h-screen p-4 relative overflow-hidden" style="background: radial-gradient(circle at center, #2a0b12 0%, #0f172a 95%);">

    <!-- O Título Gigante "CEASAR" -->
    <div class="text-center z-10 mb-10 mt-8">
        <h1 class="font-serif text-6xl md:text-8xl font-black text-white mb-2 uppercase tracking-tight">
            CEASAR
        </h1>
        <p class="text-roman-gold text-lg md:text-xl font-medium tracking-wide">
            GET FULL ACCESS
        </p>
    </div>

    <!-- Cartão de Checkout (Usando o bg-roman-card para manter coerência) -->
    <div class="bg-roman-card p-8 md:p-10 rounded-2xl border border-white/10 shadow-[0_0_40px_rgba(0,0,0,0.5)] max-w-md w-full text-center relative z-10">
        
        <!-- Preço em Destaque -->
        <div class="flex items-end justify-center gap-1 mb-6 mt-2">
            <span class="text-5xl md:text-2xl font-extrabold text-roman-gold">9.89€</span>
            <span class="text-gray-400 font-medium mb-1 md:mb-1">/ month</span>
        </div>
        
        <p class="text-sm text-gray-400 mb-3">Licensing account:</p>
        
        <!-- Caixa com o email/lobby id -->
        <div id="lobby-id-display" class="bg-[#0a0f1d] p-3 md:p-4 rounded-lg font-mono text-green-400 mb-8 border border-white/5 text-lg shadow-inner">
            Loading...
        </div>

        <!-- Botões do PayPal -->
        <div id="paypal-button-container" class="min-h-[150px]"></div>
        
        <p class="text-xs text-gray-500 mt-6 leading-relaxed">
            Your license is activated instantly upon payment. You can cancel your subscription securely at any time from your PayPal dashboard.
        </p>
    </div>

    <script>
        // 1. Extrair o 'user' do URL (Ex: checkout.html?user=leewinga#MDL)
        const urlParams = new URLSearchParams(window.location.search);
        const lobbyId = urlParams.get('user');

        if (!lobbyId) {
            document.getElementById('lobby-id-display').innerText = "ERROR: Account missing. Go back to Travian Lobby and click the 'Renew' button again.";
            document.getElementById('lobby-id-display').className = "bg-roman-red/20 p-4 rounded-lg font-mono text-white mb-8 border border-roman-red text-lg shadow-inner";
            // Esconder botões do PayPal se não houver conta
            document.getElementById('paypal-button-container').style.display = "none";
        } else {
            document.getElementById('lobby-id-display').innerText = lobbyId;

            // 2. Renderizar Subscrição do PayPal
            paypal.Buttons({
                style: {
                    shape: 'rect',
                    color: 'gold',
                    layout: 'vertical',
                    label: 'subscribe'
                },
                createSubscription: function(data, actions) {
                    return actions.subscription.create({
                        /* AQUI: Coloca o Plan ID que geraste no teu PayPal (ex: P-123456789) */
                        'plan_id': 'P-O_TEU_PLAN_ID_AQUI', 
                        
                        /* AQUI: Passamos o LobbyId (email) para o PayPal enviar ao teu servidor via Webhook */
                        'custom_id': lobbyId 
                    });
                },
                onApprove: function(data, actions) {
                    // O pagamento recorrente foi aprovado
                    alert("Subscription Activated! Thank you.\n\nRefresh your Travian tab to see your premium status.");
                    window.location.href = "index.html";
                }
            }).render('#paypal-button-container');
        }
    </script>
</body>
</html>
